# KYC Verification routes
ps_pskyc_verification_index:
  path: /pskyc/verification
  methods: [GET, POST]
  defaults:
    _controller: 'PrestaShop\Module\Pskyc\Controller\Admin\VerificationController::indexAction'

ps_pskyc_verification_search:
  path: /pskyc/verification/search
  methods: [POST]
  defaults:
    _controller: 'PrestaShop\Module\Pskyc\Controller\Admin\VerificationController::searchAction'

ps_pskyc_verification_view:
  path: /pskyc/verification/{verificationId}/view
  methods: [GET]
  defaults:
    _controller: 'PrestaShop\Module\Pskyc\Controller\Admin\VerificationController::viewAction'
  requirements:
    verificationId: \d+

ps_pskyc_verification_approve:
  path: /pskyc/verification/{verificationId}/approve
  methods: [POST]
  defaults:
    _controller: 'PrestaShop\Module\Pskyc\Controller\Admin\VerificationController::approveAction'
  requirements:
    verificationId: \d+

ps_pskyc_verification_reject:
  path: /pskyc/verification/{verificationId}/reject
  methods: [POST]
  defaults:
    _controller: 'PrestaShop\Module\Pskyc\Controller\Admin\VerificationController::rejectAction'
  requirements:
    verificationId: \d+

ps_pskyc_verification_delete:
  path: /pskyc/verification/{verificationId}/delete
  methods: [POST, DELETE]
  defaults:
    _controller: 'PrestaShop\Module\Pskyc\Controller\Admin\VerificationController::deleteAction'
  requirements:
    verificationId: \d+

ps_pskyc_verification_delete_bulk:
  path: /pskyc/verification/delete/bulk
  methods: [POST]
  defaults:
    _controller: 'PrestaShop\Module\Pskyc\Controller\Admin\VerificationController::deleteBulkAction'

ps_pskyc_verification_approve_bulk:
  path: /pskyc/verification/approve/bulk
  methods: [POST]
  defaults:
    _controller: 'PrestaShop\Module\Pskyc\Controller\Admin\VerificationController::approveBulkAction'

ps_pskyc_verification_reject_bulk:
  path: /pskyc/verification/reject/bulk
  methods: [POST]
  defaults:
    _controller: 'PrestaShop\Module\Pskyc\Controller\Admin\VerificationController::rejectBulkAction'

ps_pskyc_verification_export:
  path: /pskyc/verification/export
  methods: [GET]
  defaults:
    _controller: 'PrestaShop\Module\Pskyc\Controller\Admin\VerificationController::exportAction'

ps_pskyc_document_download:
    path: /pskyc/document/{documentId}/{preview}
    methods: [GET]
    defaults:
        _controller: 'PrestaShop\Module\Pskyc\Controller\Admin\DocumentController::downloadAction'
        preview: 0
    requirements:
        documentId: '\d+'
        preview: '\d+'