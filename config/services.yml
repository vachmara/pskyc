services:
  _defaults:
    public: true

  # Repositories
  pskyc.verification_repository:
    class: PrestaShop\Module\Pskyc\Repository\VerificationRepository
    arguments:
      - '@doctrine.dbal.default_connection'

  pskyc.document_repository:
    class: PrestaShop\Module\Pskyc\Repository\DocumentRepository
    arguments:
      - '@doctrine.dbal.default_connection'

  pskyc.log_repository:
    class: PrestaShop\Module\Pskyc\Repository\LogRepository
    arguments:
      - '@doctrine.dbal.default_connection'

  # Core Services
  pskyc.encryption_service:
    class: PrestaShop\Module\Pskyc\Service\EncryptionService

  # Business Services
  pskyc.document_service:
    class: PrestaShop\Module\Pskyc\Service\DocumentService
    arguments:
      - '@pskyc.document_repository'
      - '@pskyc.encryption_service'
      - '@pskyc.verification_repository'

  pskyc.notification_service:
    class: PrestaShop\Module\Pskyc\Service\NotificationService
    arguments:
      - '@translator'

  pskyc.verification_service:
    class: PrestaShop\Module\Pskyc\Service\VerificationService
    arguments:
      - '@pskyc.verification_repository'
      - '@pskyc.document_repository'
      - '@pskyc.log_repository'
      - '@pskyc.document_service'
      - '@pskyc.notification_service'